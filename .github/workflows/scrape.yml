name: Mirror wangwenge novels

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "扫描起始 id"
        required: false
        default: "1"
      end:
        description: "扫描结束 id"
        required: false
        default: "100000"
      scan_only:
        description: "仅扫描有效 id (输出 ids.json, 不抓取正文/封面)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan only (list valid ids -> ids.json)
        if: ${{ github.event.inputs.scan_only == 'true' }}
        run: python scan_full.py ${{ github.event.inputs.start || '1' }} ${{ github.event.inputs.end || '100000' }}

      - name: Crawl novels
        if: ${{ github.event.inputs.scan_only != 'true' }}
        env:
          START: ${{ github.event.inputs.start || '56000' }}
          END: ${{ github.event.inputs.end || '96000' }}
          OUT_DIR: novels
        run: python crawl.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f novels ids.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto mirror $(date +%F)"
            git push
          fi
