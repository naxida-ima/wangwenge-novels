name: Mirror wangwenge novels (GitHub only, zipped)

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      scan_only:
        description: "仅重新扫描有效 id (输出 ids.json)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan only (refresh ids.json)
        if: ${{ github.event.inputs.scan_only == 'true' }}
        run: python scan_full.py

      - name: Crawl + zip (incremental, GitHub only)
        if: ${{ github.event.inputs.scan_only != 'true' }}
        run: python mirror.py

      - name: Commit & push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/naxida-ima/wangwenge-novels.git
          git add -f novels_*.zip wip.zip progress.json ids.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto mirror $(date +%F)"
            git push
          fi
