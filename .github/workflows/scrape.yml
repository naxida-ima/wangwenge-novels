name: Mirror wangwenge novels

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "扫描起始 id"
        required: false
        default: "56000"
      end:
        description: "扫描结束 id"
        required: false
        default: "96000"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run crawler
        env:
          START: ${{ github.event.inputs.start || '56000' }}
          END: ${{ github.event.inputs.end || '96000' }}
          OUT_DIR: novels
        run: python crawl.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f novels
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto mirror $(date +%F)"
            git push
          fi
